name: APK deployment Workflow
on:
  # workflow_dispatch:
  # push:
  #   branches-ignore: [main, gh-pages]
  push:
    branches:
      - main
    tags:
      - v*

# Job 1 - Build Signed AAB

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set version env vars
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "VITE_CURRENT_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "VERSION_NAME=${TAG}" >> $GITHUB_ENV
          MAJOR=$(echo $TAG | cut -d. -f1)
          MINOR=$(echo $TAG | cut -d. -f2)
          PATCH=$(echo $TAG | cut -d. -f3)
          echo "VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))" >> $GITHUB_ENV

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Setup build tool version variable
        shell: bash
        run: |
          BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          echo "BUILD_TOOL_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV
          echo Last build tool version is: $BUILD_TOOL_VERSION
      - name: Install app dependencies
        run: pnpm install

      - name: Build project app
        run: pnpm run build

      - name: Capacitor copy
        run: npx cap copy android

      - name: Capacitor update
        run: npx cap update android

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Make gradlew executable
        working-directory: ./android
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Execute Gradle build
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KS_PASS: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > /tmp/keystore.jks
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOL_VERSION/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KS_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out android/app/build/outputs/apk/release/shazarr-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          rm /tmp/keystore.jks

      - name: Upload app apk as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: android/app/build/outputs/apk/release/shazarr-signed.apk

      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: true
          files: |
            android/app/build/outputs/apk/release/shazarr-signed.apk

      - run: echo Build status report=${{ job.status }}

